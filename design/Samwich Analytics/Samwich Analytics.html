<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Samwich Analytics — Design Prototype</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  .app-shell { display: flex; height: 100vh; overflow: hidden; }
  .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
  .content-inner { max-width: var(--content-max); margin: 0 auto; padding: 48px 32px; width: 100%; }
  .reading-inner { max-width: var(--reading-max); margin: 0 auto; padding: 48px 32px; width: 100%; }
  /* Focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  /* Markdown styles */
  .md-body h1 { font-size: 2rem; font-weight: 600; color: var(--text-secondary); margin: 2rem 0 1rem; }
  .md-body h2 { font-size: 1.5rem; font-weight: 600; color: var(--text-secondary); margin: 1.75rem 0 0.75rem; }
  .md-body h3 { font-size: 1.2rem; font-weight: 600; color: var(--text-secondary); margin: 1.5rem 0 0.5rem; }
  .md-body p { margin-bottom: 1.1em; line-height: 1.75; color: var(--text-primary); }
  .md-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .md-body a:hover { color: var(--accent-gold); }
  .md-body code { background: var(--accent-lighter); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 0.875em; font-family: 'JetBrains Mono', monospace; }
  .md-body pre { background: #1e1e1e; color: #d4d4d4; border-radius: 10px; padding: 20px; overflow-x: auto; margin: 1.5rem 0; font-size: 0.85rem; line-height: 1.6; position: relative; }
  .md-body pre code { background: none; color: inherit; padding: 0; }
  .md-body blockquote { border-left: 3px solid var(--accent); background: var(--accent-lighter); padding: 12px 16px; border-radius: 0 6px 6px 0; margin: 1.5rem 0; font-style: italic; }
  .md-body ul, .md-body ol { padding-left: 1.5rem; margin-bottom: 1rem; line-height: 1.75; }
  .md-body li::marker { color: var(--accent); }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  /* Scroll */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  /* Project grid */
  .project-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  @media (max-width: 600px) { .project-grid { grid-template-columns: 1fr; } .content-inner { padding: 24px 16px; } .reading-inner { padding: 24px 16px; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="samwich-ui.jsx"></script>
<script type="text/babel" src="samwich-planner.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Screen definitions ── */
const SCREEN_TITLES = {

  drafts: 'Drafts',

  planner: 'Planner',
  notes: 'Notes',
  login: 'Sign In',

function PortfolioScreen() {
  const projects = [
    {
      title: 'Midway Open Space Bond Report',
      description: 'Collaborated with the UVU Statistics Lab to survey residents of Midway, Utah regarding a proposed bond for open space preservation. Analyzed results in R and co-authored a polished report that contributed to the bond\'s successful passage.',
      tags: ['Survey Design', 'R', 'Report Writing'],
      link: 'https://drive.google.com/file/d/1sHuA9nharRDQ-Or0MefJG4dNN2jp2kOL/view?usp=sharing',
    },
    {
      title: 'Call of Duty: Warzone Geospatial Analysis',
      description: 'Engineered a Python pipeline to parse complex open-source telemetry data (.usda files) from the Caldera map. Developed survival heat maps and analyzed player movement patterns to identify optimal strategic zones.',
      tags: ['Python', 'Data Engineering', 'Geospatial Analysis'],
      link: 'https://github.com/samwich-j/CODCalderaAnalysis',
    },
    {
      title: 'Utah Valley Growth & Prosperity Summit',

        <h1 style={{ fontSize: 'clamp(2rem, 5vw, var(--text-display))', fontWeight: 600, color: 'var(--text-secondary)', lineHeight: 1.15, marginBottom: 16 }}>

        <p style={{ fontSize: '1.2rem', color: 'var(--text-muted)', marginBottom: 16, fontWeight: 400 }}>Data Analyst &amp; Statistical Consultant</p>

          I'm a data analyst at UVU. I've led projects for universities, cities, and businesses alongside incredible professors and leaders. If you need help with data analysis, statistical modeling, or designing surveys and experiments, feel free to reach out!
        </p>
        <div style={{ display: 'flex', gap: 12, marginTop: 28, flexWrap: 'wrap' }}>
          <Btn variant="primary" size="lg" onClick={() => window.open('https://forms.gle/jEdQNeNfWDv9Hadu7', '_blank')}>Get in touch</Btn>
          <Btn variant="secondary" size="lg" onClick={() => window.open('/resume', '_self')}>View résumé</Btn>
        </div>
      </section>

      {/* Projects */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeading>Projects</SectionHeading>
        <div className="project-grid">
          {projects.map((p, i) => <ProjectCard key={i} {...p} onClick={() => p.link && window.open(p.link, '_blank')} />)}
        </div>
      </section>

      {/* Skills */}
      <section style={{ marginBottom: 56 }}>
        <SectionHeading>Skills</SectionHeading>
        <SkillsSection />
      </section>

      {/* Contact */}
      <section style={{
        background: 'var(--accent-lighter)', borderRadius: 'var(--radius-xl)',
        padding: '40px', textAlign: 'center', border: '1px solid var(--border)',
      }}>
        <h2 style={{ fontSize: 'var(--text-h2)', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 12 }}>Let's work together</h2>
        <p style={{ color: 'var(--text-muted)', marginBottom: 24, fontSize: '0.95rem' }}>Freelance projects, consulting, or just to say hi — I'd love to hear from you.</p>
        <Btn variant="primary" size="lg" onClick={() => window.open('https://forms.gle/jEdQNeNfWDv9Hadu7', '_blank')}>Get in touch →</Btn>
      </section>
    </div>

}

/* ── Drafts Screen ── */
function DraftsScreen({ onNavigate }) {
  const drafts = BLOG_POSTS.filter(p => p.isDraft);
  return (
    <div className="content-inner">
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.1em', color: 'var(--accent)', textTransform: 'uppercase', marginBottom: 12 }}>Private</div>
        <h1 style={{ fontSize: 'var(--text-h1)', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 8 }}>Drafts</h1>
        <p style={{ color: 'var(--text-muted)', fontSize: '0.95rem' }}>Work in progress — not yet published.</p>
      </div>
      {drafts.length === 0 ? (
        <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.9rem' }}>No drafts yet.</div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          {drafts.map(post => (
            <BlogCard key={post.slug} {...post} onClick={() => onNavigate('blog-post', post)} />
          ))}
        </div>
      )}
    </div>
  );
}


const BLOG_POSTS = [
  { slug: 'dbt-incremental-models', title: 'Why I Rewrote All My dbt Models as Incremental', date: 'April 22, 2026', description: 'Full-refresh models were killing our Snowflake bill. Here\'s the step-by-step migration that cut compute costs by 60%.', tags: ['dbt', 'SQL', 'Snowflake'] },
  { slug: 'tableau-server-python', title: 'Automating Tableau Server with Python + TSC', date: 'March 8, 2026', description: 'Using the Tableau Server Client library to publish, refresh, and tag workbooks in CI/CD without clicking through the UI.', tags: ['Tableau', 'Python', 'DevOps'] },
  { slug: 'airflow-branching', title: 'Airflow BranchPythonOperator: Patterns I Actually Use', date: 'February 3, 2026', description: 'Real-world branching patterns for conditional pipeline logic — not just the hello-world examples.', tags: ['Airflow', 'Python'], isDraft: false },
  { slug: 'churn-model', title: 'Building a Churn Model That Product Will Actually Trust', date: 'January 14, 2026', description: 'Less about the ML, more about the trust. How I shipped a churn score that PMs actually put in their PRDs.', tags: ['ML', 'Python', 'Stakeholders'], isDraft: true },
];

function BlogScreen({ onNavigate, loggedIn }) {
  const visiblePosts = loggedIn ? BLOG_POSTS : BLOG_POSTS.filter(p => !p.isDraft);
  return (
    <div className="content-inner">
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.1em', color: 'var(--accent)', textTransform: 'uppercase', marginBottom: 12 }}>Writing</div>
        <h1 style={{ fontSize: 'var(--text-h1)', fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 8 }}>Blog</h1>
        <p style={{ color: 'var(--text-muted)', fontSize: '0.95rem' }}>Project write-ups, technical notes, and things I've learned the hard way.</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column' }}>
        {visiblePosts.map(post => (
          <BlogCard key={post.slug} {...post} onClick={() => onNavigate('blog-post', post)} />
        ))}
        {!loggedIn && BLOG_POSTS.some(p => p.isDraft) && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderRadius: 8, background: 'var(--bg-hover)', border: '1px dashed var(--border-strong)', marginTop: 8, color: 'var(--text-muted)', fontSize: '0.8rem' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Draft posts are only visible when you're signed in.</span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Blog Post Screen ── */
function BlogPostScreen({ post, onBack }) {
  const sampleContent = `
## The problem with full-refresh models

When I joined the team, every single dbt model used the default \`table\` materialization. On a 50M-event-per-day pipeline, that meant rebuilding everything from scratch on every run.

Our daily Snowflake bill was \`$$$\`. Something had to change.

> "The goal isn't to make incremental models — the goal is to make models fast enough that you can run them often without crying."

## What I changed

Here's the core pattern I landed on for event-level models:

\`\`\`sql
{{ config(
    materialized='incremental',
    unique_key='event_id',
    on_schema_change='sync_all_columns'
) }}

SELECT
    event_id,
    user_id,
    event_type,
    occurred_at
FROM {{ source('raw', 'events') }}
{% if is_incremental() %}
    WHERE occurred_at > (SELECT MAX(occurred_at) FROM {{ this }})
{% endif %}
\`\`\`

The \`{% if is_incremental() %}\` block is key. On a full refresh it processes everything; on subsequent runs it only picks up new rows.

## Results

After migrating 23 models to incremental:

- **60% reduction** in daily Snowflake compute costs
- Run time dropped from 47 minutes to 8 minutes
- We could afford to run the pipeline every 15 minutes instead of once a day

## Gotchas to watch for

1. **Late-arriving data** — incremental models miss rows that arrive after the watermark. Add a lookback window.
2. **Schema changes** — \`on_schema_change='sync_all_columns'\` handles most cases but test it.
3. **Seeds and snapshots** — these don't play nice with incremental; keep them as tables.

---

Full repo for the refactored pipeline is [on GitHub](#). Questions? [Get in touch](#).
  `;

  function renderMd(md) {
    const lines = md.trim().split('\n');
    const elements = [];
    let inCode = false, codeLines = [], codeLang = '';
    let key = 0;
    lines.forEach((line, i) => {
      if (line.startsWith('```')) {
        if (!inCode) { inCode = true; codeLang = line.slice(3); codeLines = []; }
        else {
          inCode = false;
          elements.push(
            <div key={key++} style={{ position: 'relative', marginBottom: '1.5rem' }}>
              <pre style={{ margin: 0, background: '#1e1e1e', color: '#d4d4d4', borderRadius: 10, padding: '20px', overflowX: 'auto', fontSize: '0.85rem', lineHeight: 1.6 }}>
                <code>{codeLines.join('\n')}</code>
              </pre>
              {codeLang && <span style={{ position: 'absolute', top: 10, right: 14, fontSize: '0.65rem', color: '#666', letterSpacing: '0.06em', textTransform: 'uppercase' }}>{codeLang}</span>}
            </div>
          );
        }
        return;
      }
      if (inCode) { codeLines.push(line); return; }
      if (!line.trim()) { elements.push(<div key={key++} style={{ height: '0.5rem' }} />); return; }

      function parseInline(text) {
        const parts = text.split(/(`[^`]+`|\*\*[^*]+\*\*)/);
        return parts.map((p, pi) => {
          if (p.startsWith('`') && p.endsWith('`')) return <code key={pi}>{p.slice(1, -1)}</code>;
          if (p.startsWith('**') && p.endsWith('**')) return <strong key={pi}>{p.slice(2, -2)}</strong>;
          return p;
        });
      }

      if (line.startsWith('## ')) elements.push(<h2 key={key++}>{parseInline(line.slice(3))}</h2>);
      else if (line.startsWith('### ')) elements.push(<h3 key={key++}>{parseInline(line.slice(4))}</h3>);
      else if (line.startsWith('> ')) elements.push(<blockquote key={key++}><p style={{ margin: 0 }}>{parseInline(line.slice(2))}</p></blockquote>);
      else if (line.startsWith('- ') || /^\d+\./.test(line)) elements.push(<li key={key++}>{parseInline(line.replace(/^-\s|^\d+\.\s/, ''))}</li>);
      else if (line.startsWith('---')) elements.push(<hr key={key++} />);
      else elements.push(<p key={key++}>{parseInline(line)}</p>);
    });
    return elements;
  }

  return (
    <div className="reading-inner">
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: '0.8rem', fontFamily: 'var(--font-ui)', marginBottom: 32, padding: 0, transition: 'color var(--trans-fast)' }}
        onMouseEnter={e => e.currentTarget.style.color = 'var(--accent)'}
        onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}>
        <Icon name="arrowLeft" size={14} /> Blog
      </button>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 'var(--text-h1)', fontWeight: 600, color: 'var(--text-secondary)', lineHeight: 1.2, marginBottom: 12 }}>{post.title}</h1>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)' }}>{post.date}</span>
          <div style={{ display: 'flex', gap: 6 }}>
            {post.tags.map(t => <Tag key={t} label={t} small />)}
          </div>
        </div>
      </div>
      <hr style={{ border: 'none', borderTop: '1px solid var(--border)', marginBottom: 32 }} />
      <div className="md-body" style={{ fontSize: '1rem', lineHeight: 1.75 }}>
        {renderMd(sampleContent)}
      </div>
    </div>
  );
}

/* ── Main App ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "sidebarCollapsed": false,
  "accentColor": "#778450"
}/*EDITMODE-END*/;

function App() {
  const { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakSelect, TweakColor } = window;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('portfolio');
  const [blogPost, setBlogPost] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [loggedIn, setLoggedIn] = useState(false);
  const [showSignOutConfirm, setShowSignOutConfirm] = useState(false);

  const theme = tweaks.theme;

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // Apply custom accent
  useEffect(() => {
    if (tweaks.accentColor) {
      document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    }
  }, [tweaks.accentColor]);

  const isMobile = window.innerWidth < 768;
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  function navigate(s, data) {
    if (s === 'planner' && !loggedIn) { setScreen('login'); return; }
    setScreen(s);
    if (s === 'blog-post') setBlogPost(data);
    window.scrollTo && window.scrollTo(0, 0);
  }

  const screenTitle = SCREEN_TITLES[screen] || screen;

  function renderScreen() {
    if (screen === 'portfolio') return <PortfolioScreen />;
    if (screen === 'drafts') return <DraftsScreen onNavigate={navigate} />;
    if (screen === 'notes') return <NotesScreen />;
    if (screen === 'blog') return <BlogScreen onNavigate={navigate} loggedIn={loggedIn} />;
    if (screen === 'blog-post') return <BlogPostScreen post={blogPost} onBack={() => setScreen(blogPost && BLOG_POSTS.find(p=>p.slug===blogPost.slug && p.isDraft) && loggedIn ? 'drafts' : 'blog')} />;
    if (screen === 'planner') return (
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <PlannerScreen />
      </div>
    );
    if (screen === 'login') return <LoginScreen onLogin={() => { setLoggedIn(true); setScreen('planner'); }} onBack={() => setScreen('portfolio')} />;
    return null;
  }

  const isPlannerFull = screen === 'planner';

  return (
    <div className="app-shell" data-theme={theme}>
      {/* Sidebar — desktop only */}
      {!mobile && (
        <Sidebar
          currentScreen={screen}
          onNavigate={navigate}
          theme={theme}
          onToggleTheme={() => setTweak('theme', theme === 'dark' ? 'light' : 'dark')}
          isMobile={false}
          loggedIn={loggedIn}
          onSignOut={() => { setLoggedIn(false); setScreen('portfolio'); }}
        />
      )}
      {/* Mobile drawer */}
      {mobile && (
        <Sidebar
          currentScreen={screen}
          onNavigate={navigate}
          theme={theme}
          onToggleTheme={() => setTweak('theme', theme === 'dark' ? 'light' : 'dark')}
          isMobile={true}
          drawerOpen={drawerOpen}
          onCloseDrawer={() => setDrawerOpen(false)}
          loggedIn={loggedIn}
          onSignOut={() => { setLoggedIn(false); setScreen('portfolio'); }}
        />
      )}

      {/* Main content */}
      <main className="content-area" style={{ background: 'var(--bg)' }}>
        {mobile && (
          <TopBar
            title={screenTitle}
            onMenuOpen={() => setDrawerOpen(true)}
            theme={theme}
            onToggleTheme={() => setTweak('theme', theme === 'dark' ? 'light' : 'dark')}
          />
        )}
        {screen === 'login'
          ? <LoginScreen onLogin={() => { setLoggedIn(true); setScreen('planner'); }} onBack={() => setScreen('portfolio')} />
          : screen === 'planner'
            ? <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: mobile ? 'calc(100vh - 52px)' : '100vh', overflow: 'hidden' }}><PlannerScreen /></div>
            : renderScreen()
        }
      </main>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakToggle label="Dark mode" tweakKey="theme" on="dark" off="light" tweaks={tweaks} setTweak={setTweak} />
          <TweakColor label="Accent color" tweakKey="accentColor" tweaks={tweaks} setTweak={setTweak} />
        </TweakSection>
        <TweakSection label="Navigate">
          {['portfolio', 'blog', 'blog-post', 'drafts', 'planner', 'notes'].map(s => (
            <button key={s} onClick={() => {
              if (s === 'drafts' || s === 'planner' || s === 'notes') setLoggedIn(true);
              if (s === 'blog-post') setBlogPost(BLOG_POSTS[0]);
              setScreen(s);
            }} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '7px 10px', borderRadius: 6,
              background: screen === s ? 'var(--accent-light)' : 'transparent',
              color: screen === s ? 'var(--accent)' : 'var(--text-primary)',
              border: 'none', cursor: 'pointer', fontSize: '0.85rem',
              fontFamily: 'var(--font-ui)', fontWeight: screen === s ? 500 : 400,
              transition: 'all var(--trans-fast)',
            }}>{SCREEN_TITLES[s] || s}</button>
          ))}
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
